name: "Build and test"
'on':
  pull_request:
  push:
    branches:
    - main
    - ci-test
jobs:

  nixpkgs-src:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - uses: cachix/install-nix-action@v16
      with:
        nix_path: nixpkgs=channel:nixos-22.05
        extra_nix_config: |
          max-jobs = 6

    - name: "Prime nixpkgs"
      run: |
        time nix-instantiate --expr --eval 'import (import ./nix/sources.nix {}).nixpkgs {}' >/dev/null

  nixpkgs-direct:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - uses: cachix/install-nix-action@v16
      with:
        nix_path: nixpkgs=channel:nixos-22.05
        extra_nix_config: |
          max-jobs = 6

    - name: "Prime nixpkgs"
      run: |
        time nix-instantiate --expr --eval 'import (builtins.fetchTarball { url = https://github.com/NixOS/nixpkgs/archive/e9bd3d0616382fdf7a3b4d1416935c5dbdf366f8.tar.gz; }) {}' >/dev/null
